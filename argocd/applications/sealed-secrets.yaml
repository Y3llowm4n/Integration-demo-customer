apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    type: customer
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: integration-customer
  source:
    repoURL: https://github.com/Y3llowm4n/Integration-demo-customer
    targetRevision: main
    path: products/sealed-secrets/chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
