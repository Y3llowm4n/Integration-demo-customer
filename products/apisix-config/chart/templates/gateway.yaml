apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  namespace: {{ .Values.gateway.namespace }}
  name: {{ .Values.gateway.name }}
spec:
  gatewayClassName: apisix
  listeners:
  - name: http
    protocol: HTTP
    port: 80
  - name: https
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - group: ''
        kind: Secret
        name: {{ .Values.gateway.tls.secretName }}
        namespace: {{ .Values.gateway.namespace }}
  infrastructure:
    parametersRef:
      group: apisix.apache.org
      kind: GatewayProxy
      name: apisix-config
