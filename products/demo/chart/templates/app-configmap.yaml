apiVersion: v1
kind: ConfigMap
metadata:
  name: app-script
  namespace: {{ .Values.namespace }}
data:
  app.py: |
    import http.server, json, urllib.request, os

    FOO_URL = os.getenv("FOO_URL", "{{ .Values.mergedata.fooUrl }}")
    BAR_URL = os.getenv("BAR_URL", "{{ .Values.mergedata.barUrl }}")

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            foo = json.loads(urllib.request.urlopen(FOO_URL).read())
            bar = json.loads(urllib.request.urlopen(BAR_URL).read())
            body = json.dumps({"foo": foo["data"], "bar": bar["data"]}).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(body)
        def log_message(self, *args):
            pass
    http.server.HTTPServer(("", 8080), Handler).serve_forever()
