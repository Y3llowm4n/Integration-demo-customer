apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-route
  namespace: apisix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ (index .Values.routes 0).hostname }}
  rules:
{{- range .Values.routes }}

    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      filters:
{{- $plugins := .plugins | default $.Values.plugins }}
{{- range $plugins }}
        - type: ExtensionRef
          extensionRef:
            group: apisix.apache.org
            kind: PluginConfig
            name: {{ . }}
{{- end }}
      backendRefs:
        - name: {{ .service.name }}
          namespace: {{ .service.namespace }}
          port: {{ .service.port }}
{{- end }}
