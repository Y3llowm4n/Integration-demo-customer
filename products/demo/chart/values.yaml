namespace: demo

services:
  - name: foo
    image: hashicorp/http-echo:latest
    replicas: 1
    port: 5678
    response: '{"data": "foo"}'
  - name: bar
    image: hashicorp/http-echo:latest
    replicas: 1
    port: 5678
    response: '{"data": "bar"}'
  # Test rapport
  - name: test-rapport
    image: hashicorp/http-echo:latest
    replicas: 1
    port: 5678
    response: '{"data": "Here is your api-request test data"}'

serverlessServices:
  - name: serverless-test
    image: hashicorp/http-echo:latest
    port: 5678
    response: '{"data": "serverless test data"}'
  - name: serverless-orders
    image: hashicorp/http-echo:latest
    port: 5678
    response: '{"data": "serverless orders"}'

gateway:
  name: apisix-gateway
  namespace: apisix

routes:
  - path: /foo
    hostname: api.local
    service:
      name: foo
      namespace: demo
      port: 80
    plugins:
      - oidc-auth-full
      - rate-limit
  - path: /bar
    hostname: api.local
    service:
      name: bar
      namespace: demo
      port: 80
  # Test rapport
  - path: /test
    hostname: api.local
    service:
      name: test-rapport
      namespace: demo
      port: 80
  - path: /foobar
    hostname: api.local
    service:
      name: merge-data
      namespace: demo
      port: 80
    plugins:
      - oidc-auth-full
      - rate-limit
  - path: /serverless-data
    hostname: api.local
    service:
      name: serverless-data
      namespace: demo
      port: 80
    plugins:
      - oidc-auth
      - rate-limit
      - serverless-data-host-rewrite
  # Test rapport
  - path: /serverless-test
    hostname: api.local
    service:
      name: serverless-test
      namespace: demo
      port: 80
    plugins:
      - oidc-auth
      - rate-limit
      - serverless-test-host-rewrite
  - path: /serverless-orders
    hostname: api.local
    service:
      name: serverless-orders
      namespace: demo
      port: 80
    plugins:
      - oidc-auth
      - rate-limit
      - serverless-orders-host-rewrite
plugins:
  - oidc-auth
  - rate-limit


