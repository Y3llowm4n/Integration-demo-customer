apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.platform.realm.configMapName }}
  namespace: {{ .Release.Namespace }}
data:
  demo-realm.json: |
    {
      "realm": "{{ .Values.platform.realm.name }}",
      "enabled": true,
      "roles": {
        "realm": [
          {
            "name": "api-full",
            "description": "Full API access"
          }
        ]
      },
      "clients": [
        {
          "clientId": "{{ .Values.platform.oidc.clientId }}",
          "enabled": true,
          "publicClient": false,
          "redirectUris": {{ .Values.platform.oidc.redirectUris | toJson }},
          "secret": "{{ .Values.platform.oidc.clientSecret }}",
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true,
          "authorizationServicesEnabled": true,
          "authorizationSettings": {
            "allowRemoteResourceManagement": false,
            "policyEnforcementMode": "ENFORCING",
            "decisionStrategy": "UNANIMOUS",
            "resources": [
              {
                "name": "full-access-api",
                "displayName": "Full Access API",
                "ownerManagedAccess": false,
                "uris": []
              }
            ],
            "policies": [
              {
                "name": "api-full-role-policy",
                "type": "role",
                "logic": "POSITIVE",
                "decisionStrategy": "UNANIMOUS",
                "config": {
                  "roles": "[{\"id\":\"api-full\",\"required\":false}]"
                }
              },
              {
                "name": "full-access-permission",
                "type": "resource",
                "logic": "POSITIVE",
                "decisionStrategy": "UNANIMOUS",
                "config": {
                  "resources": "[\"full-access-api\"]",
                  "applyPolicies": "[\"api-full-role-policy\"]"
                }
              }
            ]
          }
        }
      ],
      "users": [
        {
          "username": "{{ .Values.platform.testUser.username }}",
          "enabled": true,
          "email": "{{ .Values.platform.testUser.email }}",
          "firstName": "Test",
          "lastName": "User",
          "emailVerified": true,
          "requiredActions": [],
          "realmRoles": ["api-full"],
          "credentials": [
            {
              "type": "password",
              "value": "{{ .Values.platform.testUser.password }}",
              "temporary": false
            }
          ]
        },
        {
          "username": "{{ .Values.platform.limitedUser.username }}",
          "enabled": true,
          "email": "{{ .Values.platform.limitedUser.email }}",
          "firstName": "Limited",
          "lastName": "User",
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            {
              "type": "password",
              "value": "{{ .Values.platform.limitedUser.password }}",
              "temporary": false
            }
          ]
        }
      ]
    }
